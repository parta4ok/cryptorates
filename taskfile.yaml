version: "3"

tasks:
    generate_swagger_spec:
        desc: "generate swagger spec from annotations"
        cmds:
            - swag init -g ./coin/internal/ports/http/public/doc.go -o ./coin/docs -ot json
    infra_up:
        desc: "start infrastructure (postgres)"
        cmds:
            - docker compose -p crypto_rates -f ./build/docker/docker-compose.yaml --profile services up -d

    infra_down:
        desc: "stop infrastructure"
        cmds:
            - docker compose -p crypto_rates -f ./build/docker/docker-compose.yaml down

    coin_run_local:
        desc: "start coin service locally"
        cmds:
            - task: infra_up
            - go run ./coin/cmd/app/main.go --config=./configs/coin.yaml
    lint:
        desc: "start golangci-lint"
        cmds:
            - golangci-lint run -c ./.golangci.yml ./...
    service:up:
        desc: "start crypto_rates locally in docker"
        cmds:
            - docker compose -p crypto_rates -f ./build/docker/docker-compose.yaml --profile services up --build -d
    service:down:
        desc: "stop crypto_rates containers"
        cmds:
            - docker compose -p crypto_rates -f ./build/docker/docker-compose.yaml --profile services down
    test:l0:
        desc: "run unit tests"
        cmds:
            - go test -count=1 -race ./...
    test:l1:
        desc: "run L1 tests (postgres + migrator required)"
        cmds:
            - docker compose -p crypto_rates -f ./build/docker/docker-compose.yaml --profile l1 up -d
            - defer: docker compose -p crypto_rates -f ./build/docker/docker-compose.yaml --profile l1 down
            - go test -count=1 -tags TEST_L1 ./...
    test:l2:
        desc: "run L2 tests (full stack required)"
        cmds:
            - docker compose -p crypto_rates -f ./build/docker/docker-compose.yaml --profile l2 up -d
            - defer: docker compose -p crypto_rates -f ./build/docker/docker-compose.yaml --profile l2 down --volumes
            - go test -count=1 -tags TEST_L2 ./...

    pprof:heap:
        desc: "open heap profile in browser (memory usage right now). usage: task pprof:heap METRICS_PORT=8083 UI_PORT=8090"
        cmds:
            - go tool pprof -http=:{{.UI_PORT}} http://localhost:{{.METRICS_PORT}}/debug/pprof/heap
        vars:
            METRICS_PORT: '{{.METRICS_PORT | default "8083"}}'
            UI_PORT: '{{.UI_PORT | default "8090"}}'

    pprof:allocs:
        desc: "open allocs profile in browser (all allocations since start, including GC-collected). usage: task pprof:allocs METRICS_PORT=8083 UI_PORT=8090"
        cmds:
            - go tool pprof -http=:{{.UI_PORT}} http://localhost:{{.METRICS_PORT}}/debug/pprof/allocs
        vars:
            METRICS_PORT: '{{.METRICS_PORT | default "8083"}}'
            UI_PORT: '{{.UI_PORT | default "8090"}}'

    pprof:cpu:
        desc: "collect CPU profile for 30s then open in browser (where the CPU spends time). usage: task pprof:cpu METRICS_PORT=8083 UI_PORT=8090"
        cmds:
            - go tool pprof -http=:{{.UI_PORT}} http://localhost:{{.METRICS_PORT}}/debug/pprof/profile?seconds=30
        vars:
            METRICS_PORT: '{{.METRICS_PORT | default "8083"}}'
            UI_PORT: '{{.UI_PORT | default "8090"}}'

    pprof:goroutine:
        desc: "open goroutine profile in browser (all running goroutines and their stacks). usage: task pprof:goroutine METRICS_PORT=8083 UI_PORT=8090"
        cmds:
            - go tool pprof -http=:{{.UI_PORT}} http://localhost:{{.METRICS_PORT}}/debug/pprof/goroutine
        vars:
            METRICS_PORT: '{{.METRICS_PORT | default "8083"}}'
            UI_PORT: '{{.UI_PORT | default "8090"}}'

    pprof:trace:
        desc: "collect runtime trace for 5s then open in browser (goroutine scheduling, GC pauses, syscalls). usage: task pprof:trace METRICS_PORT=8083 UI_PORT=8090"
        cmds:
            - curl -o /tmp/trace.out http://localhost:{{.METRICS_PORT}}/debug/pprof/trace?seconds=5
            - go tool trace /tmp/trace.out
        vars:
            METRICS_PORT: '{{.METRICS_PORT | default "8083"}}'
