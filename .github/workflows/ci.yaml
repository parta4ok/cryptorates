name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: arduino/setup-task@v2
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - run: go mod download
      - run: task lint

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: arduino/setup-task@v2
      - run: go mod download
      - run: task test:l0

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t crypto_rates-coin -f build/docker/coin/Dockerfile .
      - name: Save image artifact
        run: docker save crypto_rates-coin | gzip > coin-image.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: coin-image
          path: coin-image.tar.gz
          retention-days: 1

  test-l1:
    name: L1 Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: arduino/setup-task@v2
      - run: go mod download
      - name: Run L1 tests
        run: task test:l1
        env:
          COIN_STORAGE: ${{ secrets.COIN_STORAGE }}

  test-l2:
    name: L2 Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: arduino/setup-task@v2
      - run: go mod download
      - uses: actions/download-artifact@v4
        with:
          name: coin-image
      - name: Load Docker image
        run: docker load < coin-image.tar.gz
      - name: Create .env
        run: |
          echo "COIN_STORAGE=${{ secrets.COIN_STORAGE }}" > .env
          echo "API_KEY=${{ secrets.API_KEY }}" >> .env
      - name: Run L2 tests
        run: task test:l2
